name: Security Audit

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Generate audit report
        if: always()
        run: |
          npm audit --json > audit-report.json 2>&1 || true
          echo "## Dependency Audit Report" > audit-summary.md
          echo "" >> audit-summary.md
          echo "Generated on: $(date -u)" >> audit-summary.md
          echo "" >> audit-summary.md
          npm audit 2>&1 | tee -a audit-summary.md || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: |
            audit-report.json
            audit-summary.md
          retention-days: 30
